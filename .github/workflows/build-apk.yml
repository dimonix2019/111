# Debug APK on every push / PR. On push to the branches below, also publishes
# to GitHub Releases as the *latest* release so this URL always downloads the
# newest build (direct .apk, no zip, no login):
#
#   https://github.com/dimonix2019/111/releases/latest/download/moexmvp-debug.apk
#
# PRs only build and upload a CI artifact (no release).

name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moexmvp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  publish-latest-apk:
    needs: debug-apk
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/cursor/signal-threshold-markers-8ccb' ||
       github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: moexmvp-debug
          path: apk-out

      - name: Stable filename for direct download URL
        run: cp apk-out/app-debug.apk moexmvp-debug.apk

      - name: Publish as latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_id }}
          name: moexmvp debug (build ${{ github.run_number }})
          generate_release_notes: true
          files: moexmvp-debug.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
