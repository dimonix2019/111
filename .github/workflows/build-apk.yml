# Debug APK is signed with a fixed keystore (app/keystore/) so installs from
# GitHub Releases can be updated in-place; ephemeral CI debug keys broke upgrades.
#
# Не используйте /releases/latest/download/… если в репозитории есть другие релизы
# (например v1.21): GitHub может считать «latest» их, и по ссылке скачается не наш APK.
# CI каждый раз пересоздаёт один релиз с тегом moexmvp-debug-latest и помечает его --latest:
#
#   https://github.com/dimonix2019/111/releases/download/moexmvp-debug-latest/moexmvp-debug.apk
#
# PRs only build and upload a CI artifact (no release).

name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moexmvp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  publish-latest-apk:
    needs: debug-apk
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/cursor/signal-threshold-markers-8ccb' ||
       github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (versionName for release notes)
        uses: actions/checkout@v4

      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: moexmvp-debug
          path: apk-out

      - name: Stable filename for direct download URL
        run: cp apk-out/app-debug.apk moexmvp-debug.apk

      - name: Rolling release moexmvp-debug-latest (stable URL, always real latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          VC=$(grep -m1 'versionCode' app/build.gradle.kts | sed -E 's/.*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/')
          BODY="Приложение: **${VERSION}** (versionCode ${VC})

          - Коммит: \`${{ github.sha }}\`
          - Ветка: \`${{ github.ref_name }}\`
          - Сборка: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Прямая ссылка на APK (закрепите её; не зависит от чужих релизов в репозитории):
          \`https://github.com/${{ github.repository }}/releases/download/moexmvp-debug-latest/moexmvp-debug.apk\`"

          if gh release view moexmvp-debug-latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete moexmvp-debug-latest --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || \
              gh release delete moexmvp-debug-latest --repo "${{ github.repository }}" --yes || true
          fi
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/moexmvp-debug-latest" 2>/dev/null || true

          gh release create moexmvp-debug-latest moexmvp-debug.apk \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "MOEX MVP debug — ${VERSION} (${VC})" \
            --notes "$BODY" \
            --latest
