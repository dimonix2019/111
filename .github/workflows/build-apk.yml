# Debug APK is signed with a fixed keystore (app/keystore/) so installs from
# GitHub Releases can be updated in-place; ephemeral CI debug keys broke upgrades.
#
# Не используйте /releases/latest/download/… если в репозитории есть другие релизы:
# GitHub может считать «latest» чужой тег (например v1.21).
#
# Стабильная ссылка на наш debug APK (один релиз, тег moexmvp-debug-latest):
#   https://github.com/dimonix2019/111/releases/download/moexmvp-debug-latest/moexmvp-debug.apk
#
# Если с телефона 404: (1) репозиторий private — откройте ссылку в браузере, войдя в GitHub под аккаунтом с доступом;
# (2) релиз ещё не создан — дождитесь успешного «Publish rolling debug release» после push в default branch или cursor/*.
#
# PRs only build and upload a CI artifact (no release).
#
# Термины в коде и UI (единый смысл):
#   «ордер» / заявка — одна нога (один инструмент, Long или Short в смысле ноги спрэда);
#   «сделка» — полноценная пара ног (вход/выход по спрэду: обе ноги TATN/TATNP).

name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

# Не отменять уже идущий прогон: иначе job публикации в релиз мог не выполниться — ссылка давала 404.
concurrency:
  group: apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moexmvp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  publish-latest-apk:
    needs: debug-apk
    if: >-
      (github.event_name == 'push' &&
       (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) ||
        startsWith(github.ref, 'refs/heads/cursor/'))) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (versionName for release notes)
        uses: actions/checkout@v4

      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: moexmvp-debug
          path: apk-out

      - name: Stable filename for direct download URL
        run: cp apk-out/app-debug.apk moexmvp-debug.apk

      - name: Extract version from Gradle
        id: meta
        run: |
          VERSION=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          VC=$(grep -m1 'versionCode' app/build.gradle.kts | sed -E 's/.*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vcode=${VC}" >> "$GITHUB_OUTPUT"

      - name: Remove previous rolling release (best effort)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete moexmvp-debug-latest --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || \
            gh release delete moexmvp-debug-latest --repo "${{ github.repository }}" --yes || true
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/moexmvp-debug-latest" 2>/dev/null || true

      - name: Publish rolling debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: moexmvp-debug-latest
          target_commitish: ${{ github.sha }}
          name: MOEX MVP debug — ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.vcode }})
          body: |
            Сборка **${{ steps.meta.outputs.version }}** (versionCode ${{ steps.meta.outputs.vcode }}).

            - Коммит: `${{ github.sha }}`
            - Ветка: `${{ github.ref_name }}`
            - Workflow: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Прямая ссылка на APK:

            ```
            https://github.com/${{ github.repository }}/releases/download/moexmvp-debug-latest/moexmvp-debug.apk
            ```
          files: moexmvp-debug.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
