# Debug APK is signed with a fixed keystore (app/keystore/) so installs from
# GitHub Releases can be updated in-place; ephemeral CI debug keys broke upgrades.
#
# Стабильная ссылка: https://github.com/dimonix2019/111/releases/download/moexmvp-debug-latest/moexmvp-debug.apk
#
# Push на main / cursor/*: assembleDebug → сразу GitHub Release (без Actions artifacts — квота).
# PR: только проверка сборки.

name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --parallel --build-cache -x lint

      - name: Extract version from Gradle
        id: meta
        run: |
          VERSION=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          VC=$(grep -m1 'versionCode' app/build.gradle.kts | sed -E 's/.*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vcode=${VC}" >> "$GITHUB_OUTPUT"

      - name: Prepare APK for release
        if: >-
          (github.event_name == 'push' &&
           (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) ||
            startsWith(github.ref, 'refs/heads/cursor/'))) ||
          github.event_name == 'workflow_dispatch'
        run: cp app/build/outputs/apk/debug/app-debug.apk moexmvp-debug.apk

      - name: Remove previous rolling release (best effort)
        if: >-
          (github.event_name == 'push' &&
           (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) ||
            startsWith(github.ref, 'refs/heads/cursor/'))) ||
          github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete moexmvp-debug-latest --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || \
            gh release delete moexmvp-debug-latest --repo "${{ github.repository }}" --yes || true
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/moexmvp-debug-latest" 2>/dev/null || true

      - name: Publish rolling debug release
        if: >-
          (github.event_name == 'push' &&
           (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) ||
            startsWith(github.ref, 'refs/heads/cursor/'))) ||
          github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: moexmvp-debug-latest
          target_commitish: ${{ github.sha }}
          name: MOEX MVP debug — ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.vcode }})
          body: |
            Сборка **${{ steps.meta.outputs.version }}** (versionCode ${{ steps.meta.outputs.vcode }}).

            - Коммит: `${{ github.sha }}`
            - Ветка: `${{ github.ref_name }}`
            - Workflow: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Прямая ссылка на APK:

            ```
            https://github.com/${{ github.repository }}/releases/download/moexmvp-debug-latest/moexmvp-debug.apk
            ```
          files: moexmvp-debug.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
